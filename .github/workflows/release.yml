name: Release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    name: ${{ matrix.channel }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    strategy:
      max-parallel: 1
      matrix:
        channel: [latest, dev]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17
          cache: pnpm
          # IMPORTANT: do NOT set registry-url here (avoid auth/.npmrc side effects)

      - name: Upgrade npm (OIDC fixes ship in npm releases)
        run: npm i -g npm@latest

      - name: Configure npm registry (no token)
        run: |
          cat > ~/.npmrc <<'EOF'
          registry=https://registry.npmjs.org/
          EOF

      - name: Debug npm auth config
        run: |
          npm -v
          echo "=== user npmrc ==="
          cat ~/.npmrc || true
          echo "=== any auth/token config? ==="
          npm config list -l | grep -iE 'auth|token|always-auth' || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release
        run: pnpm prerelease

      # Version PR when changesets exist; when none remain, publish runs here and
      # changesets/action pushes tags + creates GitHub Releases (unlike plain `pnpm changeset publish`).
      - name: Create or update release PR / publish
        if: matrix.channel == 'latest'
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changesetversion
          publish: pnpm release:publish:latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release to @dev channel
        if: matrix.channel == 'dev'
        run: |
          pnpm changeset version --snapshot
          pnpm changeset publish --tag dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
